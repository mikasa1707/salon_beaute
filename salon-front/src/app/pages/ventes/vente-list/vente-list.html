<app-page-header title="Historique des ventes" subtitle="Gestion des ventes du salon" icon="fa-solid fa-cart-shopping">
  <div class="d-flex gap-2 flex-wrap">
    <!-- Recherche -->
    <div class="search-wrapper">
      <app-search-bar (searchChange)="search($event)"></app-search-bar>
    </div>

    <!-- Ajouter -->
    <button class="btn btn-primary d-flex align-items-center gap-2 px-3" type="button" (click)="openCaisse()">
      <i class="fa-solid fa-plus"></i>
    </button>
  </div>
</app-page-header>

<div class="card shadow-sm">
  <div class="card-body">
    <div class="row mb-3">
      <div class="col-md-12 text-end">
        <div class="btn-group">
          <button class="btn" [class.btn-primary]="statutPaiement == ''" [class.btn-outline-primary]="statutPaiement != ''" (click)="filterPaiement('')">
            Tous
          </button>

          <button
            class="btn"
            [class.btn-success]="statutPaiement == 'PAYE'"
            [class.btn-outline-success]="statutPaiement != 'PAYE'"
            (click)="filterPaiement('PAYE')">
            Payées
          </button>

          <button
            class="btn"
            [class.btn-warning]="statutPaiement == 'PARTIEL'"
            [class.btn-outline-warning]="statutPaiement != 'PARTIEL'"
            (click)="filterPaiement('PARTIEL')">
            Partiel
          </button>

          <button
            class="btn"
            [class.btn-danger]="statutPaiement == 'NON_PAYE'"
            [class.btn-outline-danger]="statutPaiement != 'NON_PAYE'"
            (click)="filterPaiement('NON_PAYE')">
            Non payées
          </button>
        </div>
      </div>
    </div>

    <app-data-table
      [columns]="columns"
      [data]="ventes"
      [loading]="loading"
      [page]="page"
      [totalPages]="totalPages"
      [showViewButton]="true"
      (pageChange)="changePage($event)"
      (view)="view($event)"
      (delete)="cancel($event)"></app-data-table>

    <app-pagination
      [page]="page"
      [totalPages]="totalPages"
      [total]="total"
      [limit]="limit"
      (pageChange)="changePage($event)"
      (limitChange)="changeLimit($event)"></app-pagination>
  </div>
</div>


<app-modal title="{{ selected?.numero }}" size="xl" [show]="show" (closed)="close()">
  <app-vente-details [vente]="selected"></app-vente-details>
</app-modal>

<app-modal size="xl" [show]="show" [title]="'Recette - ' + (prestation?.nom ?? '')" (closed)="close()">
  <div class="card mb-3">
    <div class="card-body">
      <app-entity-picker
        [config]="pickerConfig"
        [selected]="selectedProduitList"
        (selectedChange)="produitSelected($event)"
      >
      </app-entity-picker>

      @if (tempRecettes.length) {
        <hr />

        <div class="table-responsive">
          <table class="table table-bordered align-middle">
            <thead>
              <tr>
                <th>Produit</th>
                <th width="180">Quantité</th>
                <th>Unite</th>
                <th width="80"></th>
              </tr>
            </thead>

            <tbody>
              @for (item of tempRecettes; track item.produitId) {
                <tr>
                  <td>
                    <strong>{{ item.produit.nom }}</strong>
                  </td>

                  <td>
                    <input type="number" class="form-control" min="0.001" step="0.001" [(ngModel)]="item.quantite" />
                  </td>

                  <td >
                    {{ item.produit.uniteConsommation.symbole }}
                  </td>

                  <td class="text-center">
                    <button class="btn btn-sm btn-outline-danger" (click)="removeTemp(item.produitId)">
                      <i class="fa-solid fa-trash"></i>
                    </button>
                  </td>
                </tr>
              }
            </tbody>
          </table>
        </div>

        <div class="d-flex justify-content-end">
          <button class="btn btn-primary" (click)="saveRecette()">
            <i class="fa-solid fa-floppy-disk"></i>

            Enregistrer la recette
          </button>
        </div>
      }
    </div>
  </div>

  <div class="card">
    <div class="card-header">Produits de la recette</div>

    <app-data-table [columns]="columns" [data]="recettes" [loading]="false" (delete)="delete($event)"> </app-data-table>
  </div>
</app-modal>

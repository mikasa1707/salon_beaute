<app-page-header title="Réservation" subtitle="" icon="fa-solid fa-calendar"> </app-page-header>

<form [formGroup]="form" (ngSubmit)="save()">
  <div class="card shadow-sm">
    <div class="card-header fw-bold">Nouvelle réservation</div>

    <div class="card-body">
      <app-reservation-information
        [form]="form"
        [selectedPrestations]="selectedPrestations"
        (personnelChange)="onPersonnelChange($event)"
      >
        <hr />
        <app-reservation-prestations [(selected)]="selectedPrestations"> </app-reservation-prestations>
      </app-reservation-information>

      <hr />

      <app-reservation-notes [form]="form"> </app-reservation-notes>
    </div>

    <div class="card-footer">
      <app-reservation-summary [prestations]="selectedPrestations"> </app-reservation-summary>
      <div class="text-end mt-3">
        <button class="btn btn-primary" type="button" [disabled]="!canSave" (click)="save()">
          <i class="fa-solid fa-save"></i>
          Enregistrer
        </button>
      </div>
    </div>
  </div>
</form>

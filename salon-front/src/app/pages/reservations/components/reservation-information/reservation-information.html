<div [formGroup]="form" class="row g-3">
  <!-- ORIGINE -->
  <div class="col-md-4">
    <label class="form-label"> Origine </label>

    <div class="btn-group w-100">
      <button
        type="button"
        class="btn"
        [class.btn-primary]="form.value.origine === 'RENDEZ_VOUS'"
        [class.btn-outline-primary]="form.value.origine !== 'RENDEZ_VOUS'"
        (click)="form.patchValue({ origine: 'RENDEZ_VOUS' })"
      >
        📅 RDV
      </button>

      <button
        type="button"
        class="btn"
        [class.btn-primary]="form.value.origine === 'SANS_RDV'"
        [class.btn-outline-primary]="form.value.origine !== 'SANS_RDV'"
        (click)="form.patchValue({ origine: 'SANS_RDV' })"
      >
        ⚡ Sans RDV
      </button>
    </div>
  </div>

  <!-- CLIENT -->

  <div class="col-md-8">
    <label class="form-label"> Client </label>

    <!-- <div
      class="form-control d-flex justify-content-between align-items-center"
      role="button"
      (click)="openClientModal()"
    >
      <span>
        {{ selectedClient?.nom || 'Sélectionner un client' }}
      </span>

      <i class="fa fa-search"></i>
    </div> -->
  </div>

  

  <ng-content></ng-content>

  <!-- DATE -->

  <div class="col-md-4">
    <label class="form-label"> Date </label>
    <input type="date" class="form-control" formControlName="dateDebut" />
  </div>

  <!-- HEURE -->

  <div class="col-md-4">
    <label class="form-label"> Heure </label>
    <input type="time" class="form-control" formControlName="heureDebut" />
  </div>

  <!-- PERSONNEL -->

  <div class="col-md-12">
    <label class="form-label"> Personnel </label>

    <div
      class="form-control d-flex justify-content-between align-items-center"
      role="button"
      (click)="openPersonnelModal()"
    >
      <span>
        @if (selectedPersonnel.length) {
          {{ selectedPersonnel.map(p => p.nom).join(', ') }}
        } @else {
          Sélectionner un personnel
        }
      </span>
      <i class="fa fa-user"></i>
    </div>
  </div>
</div>

<app-modal size="md" title="Sélection personnel" [show]="showPersonnelModal" (closed)="closePersonnelModal()">
  <app-selector-form
    title="Personnel disponible"
    [items]="personnels"
    type="checkbox"
    [limit]="10"
    [(selected)]="selectedPersonnelIds"
  >
  </app-selector-form>

  <div modal-footer class="mt-3">
    <button type="button" class="btn btn-secondary" (click)="closePersonnelModal()">Annuler</button>
    <button type="button" class="btn btn-primary" (click)="validatePersonnel()">Valider</button>
  </div>
</app-modal>

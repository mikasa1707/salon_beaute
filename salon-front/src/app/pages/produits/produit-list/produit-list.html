<app-page-header title="Produits" subtitle="Gestion des produits du salon" icon="fa-solid fa-scissors">
  <div class="d-flex gap-2 flex-wrap">
    <!-- Recherche -->
    <div class="search-wrapper">
      <app-search-bar (searchChange)="search($event)"> </app-search-bar>
    </div>

    <!-- Ajouter -->
    <button
      class="btn btn-primary d-flex align-items-center gap-2 px-3"
      type="button"
      (click)="openCreate()"
    >
      <i class="fa-solid fa-plus"></i>
    </button>
  </div>
</app-page-header>

<app-data-table
  [columns]="columns"
  [data]="produits"
  [loading]="loading"
  [page]="page"
  [totalPages]="totalPages"
  (pageChange)="changePage($event)"
  /* (view)="view($event)" */
  (edit)="openEdit($event)"
  (delete)="delete($event)"
>
</app-data-table>

<app-pagination
  [page]="page"
  [totalPages]="totalPages"
  [total]="total"
  [limit]="limit"
  (pageChange)="changePage($event)"
  (limitChange)="changeLimit($event)"
>
</app-pagination>

<app-modal
  [title]="selected ? 'Modifier produit' : 'Nouveau produit'"
  [show]="showModal"
  (closed)="closeModal()"
>
  <app-produit-form [produit]="selected" (saved)="save()"> </app-produit-form>
</app-modal>

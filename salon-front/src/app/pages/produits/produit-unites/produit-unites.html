<app-page-header title="" subtitle="Gestion des unités de conditionnement" icon="fa-solid fa-boxes-stacked">
  <div class="d-flex gap-2 flex-wrap">
    <!-- Recherche -->
    <div class="search-wrapper">
      <app-search-bar (searchChange)="search($event)"> </app-search-bar>
    </div>

    <!-- Ajouter -->
    <button class="btn btn-primary d-flex align-items-center gap-2 px-3" type="button" (click)="openCreate()">
      <i class="fa-solid fa-plus"></i>
    </button>
  </div>
</app-page-header>

<app-data-table
  [columns]="columns"
  [data]="unites"
  [loading]="loading"
  [page]="page"
  [totalPages]="totalPages"
  (pageChange)="changePage($event)"
  /* (view)="view($event)" */
  (edit)="openEdit($event)"
  (delete)="delete($event)"
>
</app-data-table>

<app-pagination
  [page]="page"
  [totalPages]="totalPages"
  [total]="total"
  [limit]="limit"
  (pageChange)="changePage($event)"
  (limitChange)="changeLimit($event)"
>
</app-pagination>

 <app-modal size="lg" [title]="selected ? 'Modifier produit' : 'Nouveau produit'" [show]="showModal" (closed)="closeModal()">
  <app-produit-unites-form [produit]="produit" [unite]="selected" (saved)="save()"> </app-produit-unites-form>
</app-modal>

<app-page-header
  title="Transfert stock prestation"
  subtitle="Gestion des Transfert stock prestation"
  icon="fa-solid fa-boxes-stacked"
>
</app-page-header>

<div class="container-fluid">
  <div class="card mb-4">
    <div class="card-body">
      <app-entity-picker
        [config]="unitePickerConfig"
        [selected]="selectedUniteList"
        (selectedChange)="onUniteSelected($event)"
      >
      </app-entity-picker>
      @if (selectedUnite) {
        <hr />
        <div class="row align-items-end">
          <div class="col-md-5">
            <label class="form-label"> Produit sélectionné </label>
            <div class="form-control bg-light">
              <strong>{{ selectedUnite.nomComplet }}</strong>
              <br />
              <small class="text-muted">
                Stock disponible :
                {{ selectedUnite.stock }}
                {{ selectedUnite.nom }}
              </small>
            </div>
          </div>
          <div class="col-md-3">
            <label class="form-label"> Quantité </label>
            <input type="number" class="form-control" min="1" [max]="selectedUnite.stock" [(ngModel)]="quantite" />
          </div>
          <div class="col-md-4">
            <button
              class="btn btn-primary w-100"
              (click)="transfer()"
              [disabled]="quantite < 1 || quantite > selectedUnite.stock"
            >
              <i class="fa-solid fa-right-left"></i>
              Ajouter au stock prestation
            </button>
          </div>
        </div>
      }
    </div>
  </div>

  <div class="card">
    <div class="card-header">Stock prestation</div>
    <app-data-table
      [columns]="columnsPP"
      [data]="stockPrestations"
      [loading]="false"
      [canEdit]="false"
      (delete)="delete($event)"
    >
    </app-data-table>
  </div>
</div>

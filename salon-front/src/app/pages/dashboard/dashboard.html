<div class="container-fluid">
  <h3 class="mb-4">Dashboard</h3>

  <div class="row g-3 mb-4">
    <div class="col-md-3">
      <app-kpi-card
        title="CA aujourd'hui"
        [value]="dashboard?.kpi.caJour | currency: 'Ar' : 'symbol' : '1.0-0'"
        icon="fa fa-money-bill"
        color="secondary"></app-kpi-card>
    </div>

    <div class="col-md-2">
      <app-kpi-card title="Ventes" [value]="dashboard?.kpi.ventes" icon="fa fa-shopping-cart" color="primary"></app-kpi-card>
    </div>

    <div class="col-md-2">
      <app-kpi-card title="Réservations" [value]="dashboard?.kpi.reservations" icon="fa fa-calendar" color="warning"></app-kpi-card>
    </div>

    <div class="col-md-2">
      <app-kpi-card title="Clients" [value]="dashboard?.kpi.clients" icon="fa fa-users" color="info"></app-kpi-card>
    </div>

    <div class="col-md-3">
      <app-kpi-card
        title="Caisse"
        [value]="dashboard?.caisse.solde | currency: 'Ar' : 'symbol' : '1.0-0'"
        icon="fa fa-cash-register"
        [color]="dashboard?.caisse.ouverte ? 'success' : 'danger'"></app-kpi-card>
    </div>
  </div>

  <div class="row g-3">
    <app-reservation-table title="Réservations en cours" [reservations]="dashboard?.currentReservations ?? []" />

    <app-reservation-table title="Prochains rendez-vous (7 jours)" [reservations]="dashboard?.upcomingReservations ?? []" />
  </div>

  <div class="row g-3">
    <div class="col-lg-8">
      <app-ca-chart [data]="dashboard?.caEvolution ?? []"></app-ca-chart>
    </div>

    <div class="col-lg-4">
      <!-- <app-caisse-card [data]="dashboard?.caisse"></app-caisse-card> -->
      <app-stock-alert [items]="dashboard?.stockAlerts ?? []" (viewAll)="openStockAlertModal()"></app-stock-alert>

      <app-stock-alert-modal
        [show]="showStockAlertModal"
        [items]="dashboard?.stockAlerts ?? []"
        (closed)="closeStockAlertModal()"
        (openStock)="goStock($event)"></app-stock-alert-modal>
    </div>
  </div>

  <div class="row mt-3"></div>

  <div class="row g-3 mt-1">
    <div class="col-lg-4">
      <app-top-personnel [data]="dashboard?.personnels"></app-top-personnel>
    </div>

    <div class="col-lg-4">
      <app-top-produit [data]="dashboard?.topProduit"></app-top-produit>
    </div>

    <div class="col-lg-4">
      <app-top-prestation [data]="dashboard?.prestations"></app-top-prestation>
    </div>
  </div>

  <div class="row g-3 mt-1">
    <div class="col-lg-12">
      <app-mouvement-list [data]="dashboard?.mouvements"></app-mouvement-list>
    </div>
  </div>
</div>

@if (totalPages > 0) {
  <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-3 bg-dark p-1">
    <!-- INFO + LIMIT -->
    <div class="d-flex align-items-center gap-3">
      @if (showLimit) {
        <span class="text-light small">Affichage {{ (page - 1) * limit + 1 }} - {{ Math.min(page * limit, total) }} sur {{ total }}</span>

        <select #limitSelect class="form-select form-select-sm w-auto" [value]="limit" (change)="changeLimit(limitSelect.value)">
          <option value="10">10 / page</option>
          <option value="25">25 / page</option>
          <option value="50">50 / page</option>
          <option value="100">100 / page</option>
        </select>
      }
    </div>

    <!-- PAGINATION -->
    <nav aria-label="Pagination">
      <ul class="pagination pagination-sm justify-content-center mb-0">
        <!-- PREVIOUS -->
        <li class="page-item" [class.disabled]="page === 1">
          <button class="page-link rounded-start" (click)="changePage(page - 1)">
            <i class="fa fa-chevron-left"></i>
          </button>
        </li>

        @for (p of pages; track $index) {
          @if (p === '...') {
            <li class="page-item disabled">
              <span class="page-link">...</span>
            </li>
          } @else {
            <li class="page-item" [class.active]="p === page">
              <button class="page-link" (click)="changePage(p)">
                {{ p }}
              </button>
            </li>
          }
        }

        <!-- NEXT -->
        <li class="page-item" [class.disabled]="page === totalPages">
          <button class="page-link rounded-end" (click)="changePage(page + 1)">
            <i class="fa fa-chevron-right"></i>
          </button>
        </li>
      </ul>
    </nav>
  </div>
}

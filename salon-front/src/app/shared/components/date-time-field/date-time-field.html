<div [formGroup]="form" class="row g-3">
  <!-- DATE -->

  <div class="col-md-6">
    <label class="form-label">
      {{ dateLabel }}
    </label>

    <div class="input-group">
      <span class="input-group-text">
        <i class="fa-solid fa-calendar"></i>
      </span>

      <input #dateInput type="text" class="form-control" placeholder="Choisir une date" />
    </div>
  </div>

  <!-- HEURE -->
  <div class="col-md-6">
    @if (timePickerMode === 'clock') {
      <app-time-clock-picker [value]="form.get(timeControl)?.value" (valueChange)="setTime($event)">
      </app-time-clock-picker>
    } @else {
      <div class="input-group">
        <span class="input-group-text">
          <i class="fa-solid fa-clock"></i>
        </span>

        <input #timeInput type="text" class="form-control" />
      </div>
    }
  </div>
</div>

<div class="row g-2">
  @for (product of products; track product.id) {
    <div class="col-6 col-md-3">
      <button class="btn btn-outline-primary w-100 p-3" (click)="selected.emit(product)">
        <strong>
          {{ product.label }}
        </strong>

        <br />

        {{ product.prix_unitaire | currency: 'MGA' }}
      </button>
    </div>
  }
</div>

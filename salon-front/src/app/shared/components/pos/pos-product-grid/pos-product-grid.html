<div class="row g-2">
  @for (product of products; track product.id) {
    <div class="col-6 col-md-3">
      <button class="btn w-100 p-3" [style.background]=""  (click)="selected.emit(product)">
        <strong>
          {{ product.nomComplet }}
        </strong>

        <br />

        {{ +product.prix | currency:'Ar':'symbol':'1.0-0' }}
      </button>
    </div>
  }
</div>

<div class="row g-2">
  @for (product of products; track product.id) {

    <div class="col-6 col-md-4 col-lg-3">

      <button
        class="btn w-100 p-3 d-flex flex-column align-items-center justify-content-center"
        [style.background]="product.couleur"
        style="min-height: 120px; max-height: 120px;"
        (click)="selectProduct(product)">

        <div class="fw-bold text-center w-100">
          {{ product.label }}
        </div>

        <div class="mt-2 fw-bold fs-5 text-center">
          {{ +product.prix | currency: 'Ar' : 'symbol' : '1.0-0' }}
        </div>

      </button>

    </div>

  }
</div>

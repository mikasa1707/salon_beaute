<div class="pos-summary">
  <div class="d-flex justify-content-between">
    <span>Prestations</span>

    <strong>
      {{ totalPrestations | currency: 'Ar' : 'symbol' : '1.0-0' }}
    </strong>
  </div>

  <div class="d-flex justify-content-between">
    <span>Produits</span>

    <strong>
      {{ totalProduits | currency: 'Ar' : 'symbol' : '1.0-0' }}
    </strong>
  </div>

  <hr />

  <div class="d-flex justify-content-between">
    <span>Remise</span>

    <strong class="text-danger">- {{ remise | currency: 'Ar' : 'symbol' : '1.0-0' }}</strong>
  </div>

  <div class="d-flex justify-content-between fs-4 fw-bold">
    <span>TOTAL</span>

    <span>
      {{ total | currency: 'Ar' : 'symbol' : '1.0-0' }}
    </span>
  </div>

  <button class="btn btn-success w-100 mt-3" (click)="payer()" [disabled]="total <= 0">
    <i class="fa-solid fa-cash-register"></i>

    Payer
  </button>
</div>

<div class="card shadow-sm h-100">
  <div class="card-body d-flex align-items-center bg-{{ color }}">
    <div
      class="rounded-circle bg-{{ color }}
text-white p-3 me-3">
      <i class="{{ icon }}"></i>
    </div>

    <div>
      <div class="text-muted small">
        {{ title }}
      </div>

      <h4 class="mb-0 fw-bold">
        {{ value }}
      </h4>
    </div>
  </div>
</div>

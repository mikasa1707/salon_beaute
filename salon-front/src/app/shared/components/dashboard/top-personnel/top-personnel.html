<div class="card shadow-sm h-100">
  <div class="card-header d-flex align-items-center">
    <i class="fa-solid fa-user-tie me-2"></i>
    Top personnel du mois
  </div>

  <div class="card-body p-0">
    <table class="table table-sm mb-0">
      <thead>
        <tr>
          <th>#</th>
          <th>Personnel</th>
          <!-- <th class="text-end">Prestations</th> -->
          <th class="text-end">CA</th>
        </tr>
      </thead>

      <tbody>
        @for (item of data; track item.nom; let i = $index) {
          <tr>
            <td>
              @if (i === 0) {
                🥇
              } @else if (i === 1) {
                🥈
              } @else {
                🥉
              }
            </td>

            <td>
              {{ item.prenom }}
            </td>

            <!-- <td class="text-end">
              {{ item.prestations }}
            </td> -->

            <td class="text-end fw-bold">{{ item.ca | number }} Ar</td>
          </tr>

        } @empty {
          <tr>
            <td colspan="4" class="text-center text-muted">Aucun résultat</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
